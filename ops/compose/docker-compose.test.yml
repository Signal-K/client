services:
  # Next.js Application for Testing
  nextapp-test:
    container_name: nextapp-test
    build:
      context: ../..
      dockerfile: ops/docker/next.dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../.env.test
    environment:
      - NODE_ENV=test
      - SKIP_USER_CREATION_TESTS=true
      - E2E_TEST_AUTH_ENABLED=true
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
    networks:
      - test-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: "yarn start"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Unit Tests Service
  unit-tests:
    container_name: unit-tests
    build:
      context: ../..
      dockerfile: ops/docker/test.dockerfile
    env_file:
      - ../../.env.test
    environment:
      - NODE_ENV=test
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
      - CYPRESS_SPEC=${CYPRESS_SPEC:-}
    volumes:
      - ../../:/app
      - /app/node_modules
    working_dir: /app
    networks:
      - test-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: "yarn test:unit"
    profiles:
      - unit

  # E2E Tests Service (Headless)
  e2e-tests-headless:
    container_name: e2e-tests-headless
    build:
      context: ../..
      dockerfile: ops/docker/test.dockerfile
    env_file:
      - ../../.env.test
    environment:
      - NODE_ENV=test
      - SKIP_USER_CREATION_TESTS=true
      - E2E_TEST_AUTH_ENABLED=true
      - CYPRESS_baseUrl=http://127.0.0.1:3000
      - CYPRESS_SPEC=${CYPRESS_SPEC:-}
      - DISPLAY=:99
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
    volumes:
      - ../../:/app
      - /app/node_modules
      - ../../cypress/screenshots:/app/cypress/screenshots
      - ../../cypress/videos:/app/cypress/videos
    working_dir: /app
    networks:
      - test-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nextapp-test:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for app to be ready...' &&
        sleep 10 &&
        echo 'Running E2E tests...' &&
        if [ -n \"$$CYPRESS_SPEC\" ]; then
          SKIP_USER_CREATION_TESTS=true scripts/tests/with-local-supabase-env.sh npx start-server-and-test 'yarn test:e2e:server' http://127.0.0.1:3000/auth \"scripts/tests/run-cypress.sh --headless --spec $$CYPRESS_SPEC\";
        else
          yarn test:e2e:headless;
        fi
      "
    profiles:
      - e2e

  # E2E Tests Service (Local with user creation)
  e2e-tests-local:
    container_name: e2e-tests-local
    build:
      context: ../..
      dockerfile: ops/docker/test.dockerfile
    env_file:
      - ../../.env.test
    environment:
      - NODE_ENV=test
      - SKIP_USER_CREATION_TESTS=false
      - E2E_TEST_AUTH_ENABLED=true
      - CYPRESS_baseUrl=http://127.0.0.1:3000
      - DISPLAY=:99
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
    volumes:
      - ../../:/app
      - /app/node_modules
      - ../../cypress/screenshots:/app/cypress/screenshots
      - ../../cypress/videos:/app/cypress/videos
    working_dir: /app
    networks:
      - test-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nextapp-test:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for app to be ready...' &&
        sleep 10 &&
        echo 'Running E2E tests with user creation...' &&
        yarn test:e2e:local
      "
    profiles:
      - local-test

  # All Tests Service (Unit + E2E)
  all-tests:
    container_name: all-tests
    build:
      context: ../..
      dockerfile: ops/docker/test.dockerfile
    env_file:
      - ../../.env.test
    environment:
      - NODE_ENV=test
      - SKIP_USER_CREATION_TESTS=true
      - E2E_TEST_AUTH_ENABLED=true
      - CYPRESS_baseUrl=http://127.0.0.1:3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
    volumes:
      - ../../:/app
      - /app/node_modules
      - ../../cypress/screenshots:/app/cypress/screenshots
      - ../../cypress/videos:/app/cypress/videos
    working_dir: /app
    networks:
      - test-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nextapp-test:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Running all tests...' &&
        echo 'Step 1: Unit tests' &&
        yarn test:unit &&
        echo 'Step 2: E2E tests' &&
        sleep 5 &&
        yarn test:e2e:headless &&
        echo 'All tests completed!'
      "
    profiles:
      - all

networks:
  test-network:
    driver: bridge

volumes:
  cypress_cache:
  node_modules_cache:
