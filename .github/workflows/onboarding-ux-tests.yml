name: Onboarding UX Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Onboarding and UX Unit Tests
        run: |
          npx vitest run \
            tests/unit/features/game/components/station/ResearchBriefCard.test.tsx \
            tests/unit/features/game/components/station/MissionBriefCard.test.tsx \
            tests/unit/components/onboarding/OnboardingSteps.test.tsx \
            tests/unit/components/annotating/useAnnotatorLogic.test.tsx
